name: secure_plants_diagnosis
description: Secure mobile app for real-time plant disease diagnosis using DeiT Vision Transformer.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  http: ^1.1.0                    # Backend API communication
  dio: ^5.3.2                     # Advanced HTTP with interceptors

  # Camera & Image
  camera: ^0.10.5                 # Device camera access
  image_picker: ^1.0.4           # Pick image from gallery or camera
  image: ^4.1.3                  # Image compression and manipulation
  path_provider: ^2.1.1          # File system paths

  # Authentication & Storage
  flutter_secure_storage: ^9.0.0  # Secure JWT token storage
  shared_preferences: ^2.2.2      # App preferences

  # State Management
  provider: ^6.1.1               # Lightweight state management

  # UI Components
  cupertino_icons: ^1.0.2        # iOS-style icons
  flutter_spinkit: ^5.2.0        # Loading spinners
  percent_indicator: ^4.2.3      # Confidence percentage bar
  cached_network_image: ^3.3.0   # Image caching

  # Utilities
  intl: ^0.18.1                  # Date/time formatting
  logger: ^2.0.2+1               # Logging

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.2               # Mocking for tests
  build_runner: ^2.4.6          # Code generation

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
