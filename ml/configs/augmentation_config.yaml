# Applied ONLY during training (not validation/inference)
# Goal: Bridge lab-to-field domain gap

train_transforms:
  resize: 256               # Resize shorter edge to 256
  random_crop: 224          # Random crop to 224x224 (DeiT input)
  random_horizontal_flip:
    p: 0.5                  # 50% chance of horizontal flip
  color_jitter:
    brightness: 0.3         # Field lighting variance
    contrast: 0.3
    saturation: 0.3
    hue: 0.1
  random_rotation:
    degrees: 15             # ±15° rotation for leaf angle variance
  gaussian_blur:
    kernel_size: 3
    sigma_min: 0.1
    sigma_max: 2.0
    p: 0.3                  # 30% chance of blur (camera focus variance)
  random_grayscale:
    p: 0.1
  normalize:
    mean: [0.485, 0.456, 0.406]  # ImageNet mean
    std: [0.229, 0.224, 0.225]   # ImageNet std

# Validation/inference transforms — NO augmentation
val_transforms:
  resize: 256
  center_crop: 224
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
